name: Add README footer badge

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python3 - <<'PY'
          from pathlib import Path
          p = Path('README.md')
          text = p.read_text() if p.exists() else '# blue-ridge-windows-maintenance\n'
          marker = 'https://app.aikido.dev/audit-report/external/WUuAYeTGe5MdKOz7TJTyBMJl/request'
          block = '<a href="https://app.aikido.dev/audit-report/external/WUuAYeTGe5MdKOz7TJTyBMJl/request" target="_blank">\n    <img src="https://app.aikido.dev/assets/badges/full-light-theme.svg" alt="Aikido Security Audit Report" height="40" />    \n</a>\n'
          if marker not in text:
              p.write_text(text.rstrip() + '\n\n---\n\n' + block)
          PY
          rm -f .github/workflows/add-readme-footer-badge.yml
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Add README footer badge"
          git push
